 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-bar">
    <h1 class="game-title">TETRIS</h1>
    <label class="skin-picker" for="skin-select">
      <span class="theme-toggle-icon">🎨</span>
      <select id="skin-select" class="skin-select">
        <option value="retro">Retro</option>
        <option value="neon">Neon</option>
        <option value="pastel">Pastel</option>
        <option value="pixel">Pixel art</option>
      </select>
    </label>
    <label class="theme-toggle" for="theme-switch">
      <span class="theme-toggle-icon">🌙</span>
      <input type="checkbox" id="theme-switch" />
      <span class="theme-toggle-slider"></span>
      <span class="theme-toggle-icon">☀️</span>
    </label>
  </div>
  <div class="wrapper">
    <div class="game-container">
      <div class="board-column">
        <div class="stats-bar">
          <div class="stat">
            <span class="label">SCORE</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="label">LINES</span>
            <span class="value" id="lines">0</span>
          </div>
          <div class="stat">
            <span class="label">LEVEL</span>
            <span class="value" id="level">1</span>
          </div>
        </div>
        <canvas id="board" width="300" height="600"></canvas>
      </div>

      <aside class="panel">
        <div class="panel-section" id="hold-section">
          <span class="label">HOLD</span>
          <canvas id="hold-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">POWER-UPS</span>
          <ul class="powerup-list">
            <li><span class="powerup-icon">💣</span> Bomba</li>
            <li><span class="powerup-icon">⚡</span> Rayo</li>
            <li><span class="powerup-icon">🎨</span> Tinte</li>
            <li><span class="powerup-icon">⬇️</span> Gravedad</li>
            <li><span class="powerup-icon">❄️</span> Congelar</li>
          </ul>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>C</kbd> reservar</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
