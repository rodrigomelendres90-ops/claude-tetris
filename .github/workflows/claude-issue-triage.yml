name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio
            (título: "${{ github.event.issue.title }}").

            Este proyecto es un Tetris en JavaScript vanilla, HTML5 Canvas y CSS
            (sin dependencias ni build). Toda la lógica del juego vive en `game.js`;
            `index.html` define el DOM/canvas y `style.css` el estilo.

            Haz lo siguiente:

            1. Revisa el cuerpo del issue y, si hace falta contexto adicional, revisa
               el código relevante en `game.js`, `index.html` o `style.css`.
            2. Determina los labels apropiados para este issue (por ejemplo: bug,
               enhancement, documentation, question, duplicate, wontfix). Revisa los
               labels existentes del repositorio con `gh label list` y reutilízalos
               siempre que aplique; crea un label nuevo con `gh label create` solo si
               es claramente necesario y no existe uno equivalente.
            3. Aplica los labels elegidos al issue con `gh issue edit`.
            4. Publica un comentario en el issue (`gh issue comment`) con un
               diagnóstico general del problema, en español, que incluya:
               - Resumen breve del problema o solicitud.
               - Causa raíz probable (si es un bug) o alcance de la funcionalidad
                 (si es un enhancement).
               - Qué archivo(s)/función(es) de `game.js`, `index.html` o `style.css`
                 probablemente estén involucrados.
               - Un enfoque sugerido de solución, a alto nivel.

            No implementes la solución ni modifiques código en este paso: el
            objetivo es solo triage y diagnóstico para que el equipo implemente la
            solución después.
          claude_args: |
            --allowed-tools "Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*)"
